apiVersion: agent-platform/v1
discovery:
  kindDirectories:
    Workflow: .claude/workflows
    Skill: .claude/skills
    Subagent: .claude/agents
    Hook: .claude/hooks
policy:
  hooksConfig: .claude/settings.json
  allowedPermissions:
    filesystem:
      - none
      - read
      - write
    network:
      - none
      - allow
    subprocess:
      - none
      - allow
    git:
      - none
      - read
      - write
  hookEvents:
    - SessionStart
    - Stop
