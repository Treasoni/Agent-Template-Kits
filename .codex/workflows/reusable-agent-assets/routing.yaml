workflow_id: reusable-agent-assets
required: true
when_to_use: "Turning user-provided skills, rules, prompts, hooks, scripts, templates, docs, or workflow notes into reusable agent assets and placing them in the right project location"
triggers: "把我提供的skills变成可复用; 把一个我提供的skills/rules变成可以被复用; skills rules 等变成可复用; 把rules整理成可复用; 封装成skill; 沉淀成规则; 做成复用模板; 放到合适位置; reusable skill; reusable rules; package agent instructions"
excludes: "read-only explanation; using an existing skill without changing files; installing a curated skill; ordinary app feature work; one-off document writing"
state_file_pattern: "workspace/workflow-runs/reusable-agent-assets-{task}.workflow.md"
