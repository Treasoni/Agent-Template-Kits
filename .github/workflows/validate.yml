name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install validation dependency
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run project validation
        run: bash scripts/validate.sh
      - name: Check environment template
        run: bash .codex/scripts/check-env-template.sh --strict
      - name: Audit tracked files for secrets
        run: bash skills/security-secret-audit/scripts/audit-secrets.sh
