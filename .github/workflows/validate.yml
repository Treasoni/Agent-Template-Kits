name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install validation dependency
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run project validation
        shell: bash
        run: bash scripts/validate.sh
      - name: Audit tracked files for secrets
        shell: bash
        run: bash skills/security-secret-audit/scripts/audit-secrets.sh
